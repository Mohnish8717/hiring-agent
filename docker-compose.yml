# Docker Compose for IKSHA Enterprise Infrastructure
# All services are free, open-source, and fully self-hosted.
#
# Usage:
#   docker-compose up -d          # Start all infrastructure
#   docker-compose down           # Stop all infrastructure
#   docker-compose logs -f redis  # Tail logs for a specific service

version: "3.9"

services:
  # --- Message Broker & Cache ---
  redis:
    image: redis:7-alpine
    container_name: iksha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # --- Relational Database ---
  postgres:
    image: postgres:16-alpine
    container_name: iksha-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iksha
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Object Storage (S3-compatible) ---
  minio:
    image: minio/minio:latest
    container_name: iksha-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Console UI
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # --- Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: iksha-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # --- Identity & Access Management ---
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: iksha-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/iksha
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    command: start-dev
    ports:
      - "8180:8080" # Keycloak web console
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  minio_data:
  qdrant_data:
