<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiring Agent Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        header {
            padding: 2rem;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }

        h1 { font-weight: 600; font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: var(--text-muted); margin-top: 0.5rem; }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 1rem;
        }

        button {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: var(--bg);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.02); }

        .candidate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .card {
            padding: 1.5rem;
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        .score-badge {
            float: right;
            padding: 0.25rem 0.75rem;
            background: rgba(56, 189, 248, 0.2);
            color: var(--accent);
            border-radius: 20px;
            font-weight: 600;
        }

        .name { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .summary { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1rem; }
        .tag { display: inline-block; padding: 2px 8px; background: rgba(255,255,255,0.05); border-radius: 4px; font-size: 0.75rem; color: #cbd5e1; margin-right: 5px; margin-bottom: 5px; }

        #loading { text-align: center; color: var(--text-muted); display: none; }
    </style>
</head>
<body>
    <header>
        <h1>Hiring Agent Intelligence</h1>
        <p class="subtitle">Agentic Multi-Stage ATS & Semantic Talent Discovery</p>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="query" placeholder="Search talents semantically... e.g. 'Senior React nodes with ML experience'">
            <button onclick="search()">Find Candidates</button>
        </div>

        <div id="loading">Searching knowledge base...</div>

        <div class="candidate-grid" id="candidates">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        async function fetchCandidates() {
            const resp = await fetch('/api/candidates');
            const data = await resp.json();
            render(data);
        }

        async function search() {
            const q = document.getElementById('query').value;
            if(!q) return fetchCandidates();
            
            document.getElementById('loading').style.display = 'block';
            const resp = await fetch(`/api/query?q=${encodeURIComponent(q)}`);
            const data = await resp.json();
            document.getElementById('loading').style.display = 'none';
            render(data);
        }

        function render(candidates) {
            const container = document.getElementById('candidates');
            container.innerHTML = '';
            
            if(!candidates || candidates.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #94a3b8;">No candidates found in the intelligence layer.</p>';
                return;
            }

            candidates.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card glass';
                
                const score = c.metadata.score ? c.metadata.score.toFixed(1) : 'N/A';
                const strengths = c.metadata.strengths ? c.metadata.strengths.split(', ') : [];
                
                card.innerHTML = `
                    <div class="score-badge">${score}</div>
                    <div class="name">Candidate Rank: ${c.id.split('@')[0]}</div>
                    <div class="summary">${c.document}</div>
                    <div class="strengths">
                        ${strengths.map(s => `<span class="tag">${s}</span>`).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        fetchCandidates();
    </script>
</body>
</html>
